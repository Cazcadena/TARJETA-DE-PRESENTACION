<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html,body{
    width:100%;
    height:100%;
    overflow:hidden;
    background:#000;
    font-family:Arial,Helvetica,sans-serif;
}

#video{
    position:fixed;
    top:47%;
    left:50%;
    width:100vw;
    height:100vh;
    transform:translate(-50%,-50%);
    object-fit:contain;
}


/* BOTONES */

.social{
    position:fixed;
    right:-100px;
    top:25%;
    transform:translateY(-50%);
    display:flex;
    flex-direction:column;
    gap:15px;
    z-index:99999;

    animation:entrar .9s ease forwards;
    animation-delay:.4s;
}

@keyframes entrar{

    from{
        right:-100px;
        opacity:0;
    }

    to{
        right:18px;
        opacity:1;
    }

}

.social a{

    width:60px;
    height:60px;

    border-radius:18px;

    background:#121213;

    display:flex;
    justify-content:center;
    align-items:center;

    text-decoration:none;

    color:#fff;

    font-size:28px;

    box-shadow:0 10px 30px rgba(0,0,0,.35);

    transition:.25s;

}

.social a:hover{

    transform:scale(1.1);

}

.social a:active{

    transform:scale(.95);

}

    /*=========================
   SCANNER VERDE NEÓN
=========================*/

.scanner{

    position:fixed;

    left:50%;
    bottom:35px;

    transform:translateX(-50%);

    width:280px;
    height:10px;

    border-radius:100px;

    overflow:hidden;

    backdrop-filter:blur(3px);
-webkit-backdrop-filter:blur(3px);

    background:linear-gradient(
    90deg,
    rgba(0,255,100,.03),
    rgba(0,255,100,.18),
    rgba(0,255,100,.03));

    border:1px solid rgba(0,255,120,.35);

    box-shadow:
0 0 8px #00ff66,
0 0 20px #00ff66,
0 0 40px #00ff66,
0 0 70px rgba(0,255,100,.7),
inset 0 0 18px rgba(255,255,255,.35);

    animation:pulseBar 2s ease-in-out infinite;

    z-index:99999;

    background-size:200% 100%;
animation:pulseBar 2s ease-in-out infinite, brilloBarra 2.5s linear infinite;

}
.scanner-light{

    position:absolute;

    top:-18px;
    left:-120px;

    width:120px;
    height:45px;

    border-radius:50%;

    background:radial-gradient(circle,
    rgba(255,255,255,1) 0%,
    rgba(120,255,160,1) 18%,
    rgba(0,255,100,1) 38%,
    rgba(0,255,100,.55) 62%,
    transparent 100%);

    filter:blur(3px);

    animation:scannerMove 1.1s linear infinite;

    box-shadow:
    0 0 15px #00ff66,
    0 0 30px #00ff66,
    0 0 60px #00ff66,
    0 0 90px #00ff66,
    0 0 120px #00ff66;

}
    
@keyframes scannerMove{

    0%{
        left:-120px;
    }

    50%{
        left:280px;
    }

    100%{
        left:-120px;
    }

}  

    @keyframes pulseBar{

    0%,100%{

        opacity:.75;

        transform:translateX(-50%) scaleX(.98);

    }

    50%{

        opacity:1;

        transform:translateX(-50%) scaleX(1.03);

    }

}

    .scanner-light-2{

    animation-delay:.18s;

    opacity:.35;

    filter:blur(10px);

    transform:scale(1.7);

}

    @keyframes brilloBarra{

    0%{
        background-position:0% 50%;
    }

    100%{
        background-position:200% 50%;
    }

}
    
</style>

<script>

const video=document.getElementById("video");

// Intenta reproducir con sonido
video.volume=1;
video.muted=false;

// Si el navegador bloquea el sonido,
// al primer toque comenzará con audio.

async function iniciar(){

    try{

        video.muted=false;
        video.volume=1;
        await video.play();

    }catch(e){}

}

document.addEventListener("click",iniciar,{once:true});
document.addEventListener("touchstart",iniciar,{once:true});
